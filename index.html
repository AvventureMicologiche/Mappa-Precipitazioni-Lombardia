<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precipitazioni Lombardia – Ultimi 30 giorni</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif}
  body{display:flex;flex-direction:column;background:#f0f2f5}
  header{background:#1b3f6e;color:#fff;padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.25)}
  .hdr-l{display:flex;align-items:center;gap:10px}
  .hdr-l h1{font-size:15px;font-weight:600}
  .hdr-sub{font-size:11px;opacity:.65}
  #badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25)}
  .wrap{display:flex;flex:1;overflow:hidden}
  aside{width:260px;background:#fff;border-right:1px solid #dde3ea;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
  .leg{padding:12px 14px;border-bottom:1px solid #eee}
  .sec{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:7px}
  .grad{height:10px;border-radius:5px;margin-bottom:5px;background:linear-gradient(to right,#d0e8ff 0%,#7ec8f8 15%,#29b6ef 28%,#26c9a0 40%,#8fd44e 52%,#f0c040 63%,#f08030 74%,#e02010 86%,#9b30ff 100%)}
  .grad-l{display:flex;justify-content:space-between;font-size:10px;color:#bbb}
  .opacity-ctrl{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid #eee;font-size:11px;color:#666}
  .opacity-ctrl input{flex:1;accent-color:#1b3f6e;cursor:pointer}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 14px;border-bottom:1px solid #eee}
  .stat{background:#f5f7fb;border-radius:7px;padding:7px 10px}
  .sv{font-size:18px;font-weight:700;color:#1b3f6e;line-height:1}
  .sl{font-size:9px;color:#aaa;text-transform:uppercase;margin-top:2px}
  #infobox{display:none;padding:10px 14px;border-bottom:1px solid #eee;background:#f0f6ff}
  #info-nome{font-size:13px;font-weight:700;margin-bottom:5px}
  #info-body{font-size:11px;color:#555;line-height:1.8}
  .lhdr{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#bbb;padding:7px 14px 3px;border-bottom:1px solid #eee}
  #stlist{flex:1;overflow-y:auto}
  #stlist::-webkit-scrollbar{width:4px}
  #stlist::-webkit-scrollbar-thumb{background:#dde;border-radius:2px}
  .srow{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid #f2f2f2;cursor:pointer;transition:background .1s}
  .srow:hover{background:#f0f5ff}
  .srow.active{background:#ddeeff}
  .sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
  .sname{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#333}
  .smm{font-size:11px;font-weight:700;color:#1b3f6e;min-width:35px;text-align:right}
  #map{flex:1}
  .leaflet-popup-content-wrapper{border-radius:8px!important;box-shadow:0 4px 20px rgba(0,0,0,.15)!important}
  .leaflet-popup-content{margin:10px 14px!important;min-width:160px}
  .p-nome{font-size:13px;font-weight:700;margin-bottom:7px}
  .p-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid #f5f5f5}
  .p-row:last-child{border:none}
  .p-k{color:#aaa}
  .p-v{font-weight:600;color:#222}
  #loader{position:fixed;inset:0;background:rgba(255,255,255,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:9999}
  .spinner{width:40px;height:40px;border:3px solid #eee;border-top-color:#1b3f6e;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loader-msg{font-size:13px;color:#666}
  #loader-sub{font-size:11px;color:#aaa}
  .fonte{font-size:10px;color:#aaa;padding:4px 14px;border-top:1px solid #eee;text-align:center;flex-shrink:0;background:#fff}
  .fonte a{color:#1b3f6e}
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div id="loader-msg">Caricamento mappa…</div>

</div>

<div class="fonte">

</div>

<script>
(function () {
  'use strict';

  // ── Date ───────────────────────────────────────────────────────────────────
  var now = new Date(), past = new Date();
  past.setDate(now.getDate() - 30);
  function fmtDate(d){ return d.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}); }
  function fmtISO(d){ return d.toISOString().slice(0,10); }
  document.getElementById('datehdr').textContent = fmtDate(past)+' – '+fmtDate(now)+' · ARPA Open Data';

  // ── Confine Lombardia [lon, lat] ────────────────────────────────────────────
  // Poligono reale del confine regionale (semplificato ma accurato)
  var LOMBARDIA_BORDER = [
    // Ovest: Lago Maggiore → Piemonte
    [8.622,45.748],[8.625,45.718],[8.618,45.690],[8.598,45.660],
    [8.568,45.625],[8.540,45.588],[8.518,45.548],[8.500,45.505],
    [8.492,45.462],[8.496,45.420],[8.512,45.382],[8.538,45.346],
    [8.572,45.318],[8.614,45.292],[8.660,45.268],[8.706,45.244],
    [8.754,45.216],[8.802,45.186],[8.852,45.158],[8.904,45.130],
    [8.956,45.108],[9.008,45.084],[9.060,45.062],
    // Sud: da Voghera → Mantova (Po)
    [9.120,45.032],[9.190,45.004],[9.258,44.980],[9.328,44.964],
    [9.402,44.952],[9.480,44.944],[9.558,44.940],[9.638,44.946],
    [9.720,44.964],[9.800,44.984],[9.882,45.006],[9.964,45.028],
    [10.046,45.050],[10.128,45.072],[10.210,45.098],[10.292,45.126],
    [10.372,45.148],[10.452,45.162],[10.532,45.172],[10.614,45.180],
    [10.696,45.190],[10.764,45.200],[10.830,45.212],[10.886,45.232],
    // Est: confine con Veneto
    [10.908,45.268],[10.926,45.320],[10.944,45.374],[10.960,45.430],
    [10.970,45.490],[10.978,45.550],[10.982,45.610],[10.966,45.668],
    [10.938,45.726],[10.902,45.784],[10.854,45.838],[10.800,45.890],
    [10.738,45.934],[10.668,45.966],[10.590,45.986],[10.506,45.998],
    // Nord-Est: Stelvio/Valtellina alta
    [10.424,46.034],[10.376,46.074],[10.346,46.120],[10.374,46.168],
    [10.416,46.218],[10.450,46.270],[10.478,46.324],[10.500,46.380],
    [10.520,46.440],[10.514,46.500],[10.486,46.548],
    // Nord: cresta alpina confine svizzero (da est verso ovest)
    [10.420,46.524],[10.336,46.534],[10.252,46.524],[10.170,46.510],
    [10.086,46.490],[10.002,46.468],[9.920,46.444],[9.838,46.416],
    [9.758,46.386],[9.678,46.356],[9.598,46.322],[9.518,46.290],
    [9.440,46.258],[9.362,46.226],[9.286,46.194],[9.212,46.162],
    [9.142,46.130],[9.082,46.092],[9.034,46.050],[8.990,46.006],
    [8.952,45.962],[8.912,45.916],[8.864,45.876],[8.810,45.844],
    [8.752,45.818],[8.694,45.792],[8.636,45.768],[8.622,45.748]
  ];

  // ── Point-in-polygon (ray casting) ────────────────────────────────────────
  function pointInPolygon(lon, lat, poly) {
    var inside = false;
    var n = poly.length;
    for (var i = 0, j = n - 1; i < n; j = i++) {
      var xi = poly[i][0], yi = poly[i][1];
      var xj = poly[j][0], yj = poly[j][1];
      if (((yi > lat) !== (yj > lat)) &&
          (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi)) {
        inside = !inside;
      }
    }
    return inside;
  }

  // ── Scala colori ───────────────────────────────────────────────────────────
  var STOPS = [
    {v:0,  r:208,g:232,b:255},
    {v:20, r:126,g:200,b:248},
    {v:50, r:41, g:182,b:239},
    {v:90, r:38, g:201,b:160},
    {v:130,r:143,g:212,b:78},
    {v:170,r:240,g:192,b:64},
    {v:220,r:240,g:128,b:48},
    {v:280,r:224,g:32, b:16},
    {v:350,r:155,g:48, b:255}
  ];

  function mmToRGB(mm) {
    var v = Math.max(0, Math.min(mm, 350));
    for (var i = 1; i < STOPS.length; i++) {
      if (v <= STOPS[i].v) {
        var t = (v - STOPS[i-1].v) / (STOPS[i].v - STOPS[i-1].v);
        return [
          Math.round(STOPS[i-1].r + t*(STOPS[i].r - STOPS[i-1].r)),
          Math.round(STOPS[i-1].g + t*(STOPS[i].g - STOPS[i-1].g)),
          Math.round(STOPS[i-1].b + t*(STOPS[i].b - STOPS[i-1].b))
        ];
      }
    }
    return [155,48,255];
  }

  function col(mm) { var c = mmToRGB(mm); return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }

  // ── Mappa Leaflet ──────────────────────────────────────────────────────────
  var map = L.map('map').setView([45.65, 9.85], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, subdomains: 'abc',
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | Dati: ARPA Lombardia'
  }).addTo(map);

  // Mostra confine Lombardia sulla mappa
  var borderLatLngs = LOMBARDIA_BORDER.map(function(c){ return [c[1], c[0]]; });
  L.polygon(borderLatLngs, {
    color: '#1b3f6e', weight: 1.5, opacity: 0.6, fill: false, dashArray: '4,4'
  }).addTo(map);

  // ── Canvas IDW con maschera ────────────────────────────────────────────────
  var heatOpacity  = 0.65;
  var currentData  = [];
  var heatCanvas   = null;
  var heatCtx      = null;
  var drawTimer    = null;

  function initCanvas() {
    if (heatCanvas) return;
    heatCanvas = document.createElement('canvas');
    heatCanvas.style.position = 'absolute';
    heatCanvas.style.top  = '0';
    heatCanvas.style.left = '0';
    heatCanvas.style.pointerEvents = 'none';
    heatCanvas.style.zIndex = '250';
    map.getPanes().overlayPane.appendChild(heatCanvas);
    heatCtx = heatCanvas.getContext('2d');
  }

  function drawHeat() {
    if (!heatCanvas || !heatCtx || currentData.length === 0) return;

    var size = map.getSize();
    heatCanvas.width  = size.x;
    heatCanvas.height = size.y;

    var topLeft = map.containerPointToLayerPoint([0,0]);
    heatCanvas.style.transform = 'translate('+topLeft.x+'px,'+topLeft.y+'px)';

    var W = size.x, H = size.y;
    heatCtx.clearRect(0, 0, W, H);

    // Converti stazioni in coordinate pixel
    var stations = currentData.map(function(s) {
      var pt = map.latLngToContainerPoint(L.latLng(s.lat, s.lon));
      return { x: pt.x, y: pt.y, mm: s.mm, lat: s.lat, lon: s.lon };
    });

    // Raggio in pixel (più stretto = interpolazione più fedele ai dati)
    var zoom = map.getZoom();
    // A zoom 8 ≈ 120px, a zoom 10 ≈ 200px — si adatta allo zoom
    var R = Math.max(50, Math.min(200, 15 * Math.pow(2, zoom - 6)));

    var STEP = 3;
    var imgData = heatCtx.createImageData(W, H);
    var px = imgData.data;

    for (var y = 0; y < H; y += STEP) {
      for (var x = 0; x < W; x += STEP) {

        // Converte pixel in lat/lon per test point-in-polygon
        var latlng = map.containerPointToLatLng([x, y]);
        var lon = latlng.lng, lat = latlng.lat;

        // MASCHERA: salta pixel fuori dalla Lombardia
        if (!pointInPolygon(lon, lat, LOMBARDIA_BORDER)) continue;

        // IDW interpolation
        var num = 0, den = 0, found = false;
        for (var i = 0; i < stations.length; i++) {
          var dx = x - stations[i].x;
          var dy = y - stations[i].y;
          var d2 = dx*dx + dy*dy;
          if (d2 > R*R) continue;
          found = true;
          if (d2 < 1) { num = stations[i].mm; den = 1; break; }
          var w = 1.0 / d2;
          num += w * stations[i].mm;
          den += w;
        }

        if (!found) {
          // Nessuna stazione nel raggio: usa IDW globale (evita buchi)
          for (var i = 0; i < stations.length; i++) {
            var dx = x - stations[i].x;
            var dy = y - stations[i].y;
            var d2 = dx*dx + dy*dy;
            var w = 1.0 / d2;
            num += w * stations[i].mm;
            den += w;
          }
        }

        if (den === 0) continue;
        var mm  = num / den;
        var rgb = mmToRGB(mm);
        var a   = Math.round(heatOpacity * 255);

        for (var by = 0; by < STEP; by++) {
          var ry = y + by; if (ry >= H) break;
          for (var bx = 0; bx < STEP; bx++) {
            var rx = x + bx; if (rx >= W) break;
            var idx = (ry * W + rx) * 4;
            px[idx]   = rgb[0];
            px[idx+1] = rgb[1];
            px[idx+2] = rgb[2];
            px[idx+3] = a;
          }
        }
      }
    }

    heatCtx.putImageData(imgData, 0, 0);
    heatCanvas.style.opacity = '1';
  }

  function scheduleDraw(delay) {
    if (drawTimer) clearTimeout(drawTimer);
    drawTimer = setTimeout(drawHeat, delay || 80);
  }

  map.on('movestart zoomstart', function() {
    if (heatCanvas) heatCanvas.style.opacity = '0';
  });
  map.on('moveend zoomend', function() { scheduleDraw(100); });

  document.getElementById('opSlider').addEventListener('input', function() {
    heatOpacity = this.value / 100;
    document.getElementById('opVal').textContent = this.value + '%';
    scheduleDraw(60);
  });

  // ── Dati campione ──────────────────────────────────────────────────────────
  var FALLBACK = [
    {n:"Milano Lambrate",    lat:45.484,lon:9.238,  mm:58, q:122,p:"MI"},
    {n:"Milano Brera",       lat:45.472,lon:9.186,  mm:54, q:121,p:"MI"},

    {n:"Luino",              lat:46.000,lon:8.744,  mm:183,q:202,p:"VA"},
    {n:"Busto Arsizio",      lat:45.612,lon:8.852,  mm:94, q:224,p:"VA"},
    {n:"Gallarate",          lat:45.660,lon:8.789,  mm:87, q:238,p:"VA"},
    {n:"Sesto Calende",      lat:45.731,lon:8.638,  mm:96, q:197,p:"VA"},
    {n:"Saronno",            lat:45.624,lon:9.040,  mm:78, q:212,p:"VA"},
    {n:"Como",               lat:45.810,lon:9.085,  mm:125,q:201,p:"CO"},
    {n:"Bellagio",           lat:45.987,lon:9.260,  mm:142,q:210,p:"CO"},
    {n:"Erba",               lat:45.812,lon:9.222,  mm:108,q:322,p:"CO"},
    {n:"Cantù",              lat:45.737,lon:9.128,  mm:97, q:370,p:"CO"},

  ];

  // ── ARPA Live ──────────────────────────────────────────────────────────────
  function loadARPA() {
    document.getElementById('loader-sub').textContent = 'Connessione ARPA Lombardia…';
    var stUrl = 'https://www.dati.lombardia.it/resource/nf78-nj6b.json'
      + '?$limit=600&$select=idsensore,nomestazione,lat,lng,quota,provincia'
      + "&$where=tipologiasensore='Pioggia'";
    var prUrl = 'https://www.dati.lombardia.it/resource/pstb-pga6.json'
      + '?$select=idsensore,sum(valore)%20as%20tot'
      + '&$where=data>=%27'+fmtISO(past)+'T00:00:00%27'
      + '&$group=idsensore&$limit=5000';

    Promise.all([fetch(stUrl), fetch(prUrl)])
      .then(function(rs){
        if (!rs[0].ok || !rs[1].ok) throw new Error('HTTP');
        return Promise.all([rs[0].json(), rs[1].json()]);
      })
      .then(function(res){
        document.getElementById('loader-sub').textContent = 'Elaborazione…';
        var stMap = {};
        res[0].forEach(function(s){
          var lat=parseFloat(s.lat), lon=parseFloat(s.lng);
          if (!isNaN(lat)&&!isNaN(lon)&&lat>44&&lat<47&&lon>7&&lon<12)
            stMap[s.idsensore]={n:s.nomestazione||'—',lat:lat,lon:lon,q:s.quota||'—',p:s.provincia||'—'};
        });
        var out=[];
        res[1].forEach(function(pr){
          var mm=parseFloat(pr.tot);
          if (isNaN(mm)||mm<0) return;
          var st=stMap[pr.idsensore]; if (!st) return;
          out.push({n:st.n,lat:st.lat,lon:st.lon,q:st.q,p:st.p,mm:Math.round(mm*10)/10});
        });
        if (out.length < 10) throw new Error('pochi dati');
        render(out, '🟢 ARPA live');
      })
      .catch(function(e){
        console.warn('Fallback:', e.message);
        render(FALLBACK, '🟡 dati campione');
      });
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render(dati, fonte) {
    currentData = dati;
    var sorted = dati.slice().sort(function(a,b){ return b.mm-a.mm; });
    var vals   = dati.map(function(d){ return d.mm; });
    var mx = Math.max.apply(null,vals), mn = Math.min.apply(null,vals);
    var av = Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);

    document.getElementById('sn').textContent  = dati.length;
    document.getElementById('smx').textContent = Math.round(mx);
    document.getElementById('sav').textContent = av;
    document.getElementById('smn').textContent = Math.round(mn);
    document.getElementById('badge').textContent = dati.length+' stazioni · '+fonte;

    var mkrs={}, selNome=null;

    function selectSt(s,rank){
      if (selNome){var pv=document.getElementById('r-'+selNome);if(pv)pv.classList.remove('active');}
      selNome=s.n;
      var row=document.getElementById('r-'+s.n);
      if (row){row.classList.add('active');row.scrollIntoView({block:'nearest'});}
      document.getElementById('infobox').style.display='block';
      var nm=document.getElementById('info-nome');
      nm.textContent=s.n; nm.style.color=col(s.mm);
      document.getElementById('info-body').innerHTML=
        '<b>'+s.mm+' mm</b> pioggia cumulata<br>'+
        'Provincia: <b>'+s.p+'</b> &nbsp;·&nbsp; Quota: <b>'+s.q+' m</b><br>'+
        'Ranking: <b>#'+rank+'</b> su '+dati.length+' stazioni';
    }

    dati.forEach(function(s){
      var c=col(s.mm), rank=sorted.indexOf(s)+1;
      var m=L.circleMarker([s.lat,s.lon],{
        radius:5, fillColor:c, color:'#fff', weight:1.5, fillOpacity:0.95
      }).addTo(map);
      m.bindPopup(
        '<div class="p-nome" style="color:'+c+'">'+s.n+'</div>'+
        '<div class="p-row"><span class="p-k">Pioggia</span><span class="p-v">'+s.mm+' mm</span></div>'+
        '<div class="p-row"><span class="p-k">Provincia</span><span class="p-v">'+s.p+'</span></div>'+
        '<div class="p-row"><span class="p-k">Quota</span><span class="p-v">'+s.q+' m slm</span></div>'+
        '<div class="p-row"><span class="p-k">Ranking</span><span class="p-v">#'+rank+' / '+dati.length+'</span></div>'
      );
      m.on('click',(function(s,r){return function(){selectSt(s,r);};}(s,rank)));
      mkrs[s.n]=m;
    });

    var list=document.getElementById('stlist');
    sorted.forEach(function(s,i){
      var d=document.createElement('div');
      d.className='srow'; d.id='r-'+s.n;
      d.innerHTML='<div class="sdot" style="background:'+col(s.mm)+'"></div>'+
        '<div class="sname" title="'+s.n+'">'+s.n+'</div>'+
        '<div class="smm">'+s.mm+'</div>';
      d.onclick=(function(s,i){return function(){
        map.flyTo([s.lat,s.lon],12,{duration:0.8});
        selectSt(s,i+1); mkrs[s.n].openPopup();
      };}(s,i));
      list.appendChild(d);
    });

    document.getElementById('loader').style.display='none';

    initCanvas();
    setTimeout(function(){ drawHeat(); }, 400);
  }

  loadARPA();
}());
</script>
</body>
